name: DevSecOps Pipeline - service-incident

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Detect secrets in code
      - name: Secret detection (GitLeaks)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install and run GitLeaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . --verbose

      # Step 3 - Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 4 - Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # Step 5 - Scan dependencies for CVEs
      - name: Dependency scan (Snyk)
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Step 6 - Build the project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 7 - Run unit tests
      - name: Run tests
        run: mvn test

      # Step 8 - Scan Docker image for vulnerabilities
      - name: Build Docker image
        run: docker build -t service-incident:latest .

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: service-incident:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      # Step 9 - Push image to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag service-incident:latest ghcr.io/devsecops-microservices/service-incident:latest
          docker push ghcr.io/devsecops-microservices/service-incident:latest